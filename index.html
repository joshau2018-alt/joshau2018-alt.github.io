<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Responsive Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Top Horizontal Image Banner -->
    <section class="top-banner">
        <div class="img-placeholder banner-img">IMG</div>
    </section>

    <!-- Header with Logo and Company Name -->
    <header class="header" id="header">
        <div class="header-container">
            <div class="logo">LOGO</div>
            <div class="company-name">CC Roadside Assistance</div>
            <nav class="nav-menu" id="nav-menu">
                <button class="dropdown-btn">Menu ▼</button>
                <div class="dropdown-content" id="dropdown-content">
                    <a href="#section1">About</a>
                    <a href="#section2">Services</a>
                    <a href="#section3">Reviews</a>
                    <a href="#contact">Contact</a>
                </div>
            </nav>
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="main-content">
        
        <!-- Hero Section with Left Image and Right Text -->
        <section class="hero-section">
            <div class="hero-left">
                <div class="img-placeholder">IMG</div>
            </div>
            <div class="hero-right">
                <div class="text-content">
                    TEXT
                    <div class="read-more-btn">Read more</div>
                </div>
            </div>
        </section>

        <div class="b-image-section">

             <!-- Full Width Text Section -->
            <section class="full-width-text-section">
                <div class="text-content">
                  TEXT SPANNING THE FULL WIDTH OF THE SCREEN
                    <div class="read-more-btn">Read more</div>
                </div>
            </section>
        </div>
        <!-- Full Width Image Section -->
        

        <!-- Bottom Content Section with Image Left and Text Right -->
        <section class="bottom-content-section">
            <div class="img-placeholder">IMG</div>
            <div class="text-area">
                <div class="text-content">
                    TEXT
                    <div class="find-out-more">Find out more</div>
                </div>
            </div>
        </section>

    </main>

    <!-- Footer Section -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-left">
                <div class="img-placeholder footer-img">IMG</div>
            </div>
            <div class="footer-center">
                <div class="text-content footer-text">TEXT</div>
            </div>
            <div class="footer-right">
                <div class="info-box">INFO here</div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
