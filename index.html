<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Responsive Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <!-- Top Horizontal Image Banner -->
    <section class="top-banner">
        <div class="banner-img"> </div>
    </section>

    <!-- Header with Logo and Company Name -->
    <header class="header" id="header">
        <div class="header-container">
            <div class="logo">LOGO</div>
            <div class="company-name">C&C Roadside Assistance</div>
            <nav class="nav-menu" id="nav-menu">
                <button class="dropdown-btn">Menu ▼</button>
                <div class="dropdown-content" id="dropdown-content">
                    <a href="#section1">About</a>
                    <a href="#section2">Services</a>
                    <a href="#section3">Reviews</a>
                    <a href="#contact">Contact</a>
                </div>
            </nav>
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="main-content">
        
        <!-- Hero Section with Left Image and Right Text -->
        <section class="hero-section">
            <div class="hero-left">
                <img src="Images/aboutImg.png" alt="">
            </div>
            <div class="hero-right" style="background-color: rgb(255, 255, 255, 0.5);">
                <div class="text-content">
                    TEXT
                    <div class="read-more-btn">Read more</div>
                </div>
            </div>
        </section>

        <div class="b-image-section">

             <!-- Full Width Text Section -->
            <section class="full-width-text-section">
                <div class="text-content">
                  TEXT SPANNING THE FULL WIDTH OF THE SCREEN
                    <div class="read-more-btn">Read more</div>
                </div>
            </section>
        </div>
        <!-- Full Width Image Section -->
        

        <!-- Bottom Content Section with Text Left and Image Right -->
        <section class="bottom-content-section">
            <div class="bottom-content-left" style="background-color: rgb(255, 255, 255, 0.5);">
                <div class="text-content">
                    TEXT
                    <div class="read-more-btn">Read more</div>
                </div>
            </div>
            <div class="bottom-content-right">
                <img src="Images/ServicesImg.png" alt="">
            </div>
        </section>

    </main>

    <!-- Footer Section -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-top-shelf">
                <div class="footer-left">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3352.9236236361235!2d-97.23517919999999!3d32.82078859999999!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x864e79bba32bcafb%3A0x6d2fa548f8aa6785!2sC%26C%20Roadside%20Assistance!5e0!3m2!1sen!2sus!4v1774227491135!5m2!1sen!2sus" 
                        width="100%"
                        height="100%"
                        style="border: none; min-height: 250px;"
                        allowfullscreen=""
                        loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
                <div class="footer-center">
                    <div class="text-content footer-text">TEXT</div>
                </div>
            </div>
            <div class="footer-right">
                <div class="info-box">INFO here</div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
